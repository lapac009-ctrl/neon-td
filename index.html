<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Brawler Siege: Hardcore TD</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --red: #ff0055; --bg: #050505; --glass: rgba(20, 20, 20, 0.9); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        .panel { background: var(--glass); backdrop-filter: blur(15px); border: 2px solid var(--neon); border-radius: 15px; padding: 20px; box-shadow: 0 0 25px rgba(0,242,255,0.2); }
        
        /* Meniji */
        #main-menu { position: absolute; inset: 20px; z-index: 1000; overflow-y: auto; text-align: center; }
        .brawler-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin: 20px 0; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 10px; border-radius: 10px; cursor: pointer; }
        .card.equipped { border-color: #0f0; box-shadow: 0 0 10px #0f0; }
        .locked { opacity: 0.5; filter: grayscale(1); }

        /* Game UI */
        #game-stats { position: absolute; top: 20px; left: 20px; display: none; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; }
        .slot { width: 80px; height: 100px; border: 2px solid #444; border-radius: 10px; cursor: pointer; text-align: center; background: var(--glass); transition: 0.2s; }
        .slot.active { border-color: var(--neon); transform: scale(1.1); }

        /* Upgrade Meni u Igri */
        #upgrade-menu { position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%); display: none; gap: 15px; align-items: center; }

        .btn { background: var(--neon); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        .btn:hover { box-shadow: 0 0 15px var(--neon); }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="main-menu" class="panel">
    <h1 style="color: var(--neon); text-shadow: 0 0 15px var(--neon);">BRAWLER SIEGE</h1>
    <h2 style="color: var(--gold);">GLOBAL COINS: <span id="g-coins">0</span></h2>
    <button class="btn" style="font-size: 1.5em;" onclick="startGame()">START MISSION</button>
    <div class="brawler-grid" id="grid"></div>
</div>

<div id="game-stats" class="panel">
    <div>💵 NOVAC: <span id="m-val" style="color: #0f0;">$500</span></div>
    <div>❤️ HP: <span id="h-val" style="color: var(--red);">100</span></div>
    <div>🌊 WAVE: <span id="w-val">1</span></div>
</div>

<div id="upgrade-menu" class="panel">
    <div id="up-title" style="color: var(--neon);">BRAWLER LVL 1</div>
    <button class="btn" onclick="inGameUpgrade()">UPGRADE ($<span id="up-cost">100</span>)</button>
    <button class="btn" style="background:var(--red)" onclick="closeUpgrade()">ZATVORI</button>
</div>

<div id="hotbar"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let defaultBrawlers = [];
for(let i=1; i<=50; i++) {
    defaultBrawlers.push({
        id: i, name: i==1 ? "RECRUIT" : "BRAWLER #"+i,
        unlocked: i==1, cost: i*300,
        dmg: 15+(i*10), r: 150+(i*5), color: `hsl(${i*40}, 100%, 50%)`
    });
}

let save = JSON.parse(localStorage.getItem('brawler_siege_save')) || { coins: 0, brawlers: defaultBrawlers, equipped: [1] };
let money, hp, wave, selectedInGame = null, currentPlacing = null;
let towers = [], enemies = [];

function sync() {
    localStorage.setItem('brawler_siege_save', JSON.stringify(save));
    document.getElementById('g-coins').innerText = Math.floor(save.coins);
    renderMenu();
}

function renderMenu() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    save.brawlers.forEach(b => {
        const c = document.createElement('div');
        c.className = `card ${!b.unlocked?'locked':''} ${save.equipped.includes(b.id)?'equipped':''}`;
        c.innerHTML = `<b style="color:${b.color}">${b.name}</b><br>${!b.unlocked?'$'+b.cost:'OTKLJUČAN'}`;
        c.onclick = () => {
            if(!b.unlocked && save.coins >= b.cost) { save.coins -= b.cost; b.unlocked = true; sync(); }
            else if(b.unlocked) {
                if(!save.equipped.includes(b.id)) {
                    if(save.equipped.length >= 4) save.equipped.shift();
                    save.equipped.push(b.id); sync();
                }
            }
        };
        grid.appendChild(c);
    });
}

function startGame() {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('game-stats').style.display = 'block';
    const hb = document.getElementById('hotbar');
    hb.style.display = 'flex'; hb.innerHTML = '';
    save.equipped.forEach(id => {
        let b = save.brawlers.find(x => x.id === id);
        hb.innerHTML += `<div class="slot" id="slot-${id}" onclick="currentPlacing=${id}; selectSlot(${id})">
            <b style="color:${b.color}">${b.name}</b><br>$${b.id*100}</div>`;
    });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    money = 500; hp = 100; wave = 1; towers = []; enemies = [];
    updateUI(); loop();
}

function selectSlot(id) {
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
    document.getElementById('slot-'+id).classList.add('active');
}

canvas.onclick = (e) => {
    // Provera da li klikćemo na već postavljenu kulu za upgrade
    let clickedTower = towers.find(t => Math.hypot(t.x-e.clientX, t.y-e.clientY) < 30);
    if(clickedTower) {
        selectedInGame = clickedTower;
        document.getElementById('upgrade-menu').style.display = 'flex';
        document.getElementById('up-title').innerText = `${selectedInGame.name} LVL ${selectedInGame.lvl || 1}`;
        document.getElementById('up-cost').innerText = (selectedInGame.lvl || 1) * 150;
        return;
    }

    if(currentPlacing) {
        let b = save.brawlers.find(x => x.id === currentPlacing);
        let cost = b.id * 100;
        if(money >= cost) {
            towers.push({ ...b, x: e.clientX, y: e.clientY, lvl: 1, cd: 0 });
            money -= cost; updateUI();
        }
    }
    closeUpgrade();
};

function inGameUpgrade() {
    let cost = selectedInGame.lvl * 150;
    if(money >= cost) {
        money -= cost;
        selectedInGame.lvl++;
        selectedInGame.dmg *= 1.5;
        selectedInGame.r += 20;
        updateUI();
        document.getElementById('up-title').innerText = `${selectedInGame.name} LVL ${selectedInGame.lvl}`;
        document.getElementById('up-cost').innerText = selectedInGame.lvl * 150;
    }
}

function closeUpgrade() { document.getElementById('upgrade-menu').style.display = 'none'; selectedInGame = null; }

function updateUI() {
    document.getElementById('m-val').innerText = money;
    document.getElementById('h-val').innerText = hp;
    document.getElementById('w-val').innerText = wave;
}

setInterval(() => {
    if(document.getElementById('main-menu').style.display !== 'none') return;
    for(let i=0; i<5+wave; i++) {
        setTimeout(() => enemies.push({ 
            x: 0, y: canvas.height/2, 
            hp: 50+(wave*100), s: 1.5+(wave*0.1), 
            max: 50+(wave*100) 
        }), i*600);
    }
    wave++; updateUI();
}, 12000);

function loop() {
    ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,canvas.width, canvas.height);
    
    // Putanja
    ctx.strokeStyle = "#111"; ctx.lineWidth = 80; ctx.beginPath();
    ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();

    // Zombiji
    enemies.forEach((en, i) => {
        en.x += en.s;
        if(en.x > canvas.width) { hp -= 10; enemies.splice(i, 1); updateUI(); return; }
        ctx.fillStyle = var(--red); ctx.shadowBlur = 10; ctx.shadowColor = "red";
        ctx.fillRect(en.x-15, en.y-15, 30, 30);
        // HP bar
        ctx.fillStyle = "#333"; ctx.fillRect(en.x-15, en.y-25, 30, 5);
        ctx.fillStyle = "#0f0"; ctx.fillRect(en.x-15, en.y-25, (en.hp/en.max)*30, 5);
    });

    // Brawleri
    towers.forEach(t => {
        ctx.strokeStyle = t.color; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(t.x, t.y, 25, 0, Math.PI*2); ctx.stroke();
        
        // Prikaz dometa ako je selektovan
        if(selectedInGame === t) {
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.beginPath();
            ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.stroke();
        }

        let target = enemies.find(e => Math.hypot(e.x-t.x, e.y-t.y) < t.r);
        if(target && t.cd <= 0) {
            ctx.strokeStyle = "white"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(target.x, target.y); ctx.stroke();
            target.hp -= t.dmg; t.cd = 25;
            if(target.hp <= 0) { 
                enemies = enemies.filter(e => e !== target); 
                money += 25; save.coins += 5; sync(); 
            }
        }
        if(t.cd > 0) t.cd--;
    });

    if(hp > 0) requestAnimationFrame(loop);
    else { 
        save.coins += wave * 100; sync(); 
        alert("GAME OVER! Wave Bonus: +" + (wave*100)); location.reload(); 
    }
}
sync();
</script>
</body>
</html>
