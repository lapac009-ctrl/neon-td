<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Neon Survivors: Hardcore Online</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --neon: #00f2ff; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: #000; color: white; font-family: 'Consolas', monospace; overflow: hidden; }
        
        #menu, #upgrade-ui {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px);
            border: 2px solid var(--neon); border-radius: 20px; padding: 30px; z-index: 100;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); text-align: center;
        }

        #upgrade-ui { display: none; width: 300px; top: 70%; }

        .btn {
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 10px 20px; margin: 10px; cursor: pointer; font-size: 1em;
            transition: 0.3s; text-transform: uppercase;
        }
        .btn:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }

        #game-stats {
            position: absolute; top: 20px; left: 20px; background: var(--glass);
            padding: 15px; border-radius: 10px; border-left: 5px solid var(--neon);
        }

        canvas { background: radial-gradient(circle, #0a0a0a 0%, #000 100%); }
        .tower-info { font-size: 0.8em; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color: var(--neon); margin-bottom: 5px;">NEON SURVIVORS</h1>
    <p style="color: #555;">v2.0 HARDCORE MULTIPLAYER</p>
    
    <div id="char-select">
        <p>Izaberi Klasu:</p>
        <button class="btn" onclick="pickClass('eng')">ENGINEER (-20% Cena)</button>
        <button class="btn" onclick="pickClass('sld')">SOLDIER (+30% DMG)</button>
    </div>

    <div id="online-setup" style="display:none; margin-top:20px;">
        <p>Tvoj ID: <span id="my-id" style="color:yellow">...</span></p>
        <input type="text" id="peer-input" placeholder="Drugov ID..." style="padding:10px; border-radius:5px; border:none;">
        <br>
        <button class="btn" onclick="startHost()">HOST GAME</button>
        <button class="btn" onclick="joinGame()">JOIN GAME</button>
    </div>
</div>

<div id="upgrade-ui">
    <h3 id="up-title">KULA LVL 1</h3>
    <div class="tower-info" id="up-stats">Dmg: 10 | Range: 150</div>
    <button class="btn" onclick="doUpgrade('dmg')">UPGRADE DMG ($<span id="cost-dmg"></span>)</button>
    <button class="btn" onclick="doUpgrade('rng')">UPGRADE RANGE ($<span id="cost-rng"></span>)</button>
    <br>
    <button class="btn" style="border-color:red; color:red;" onclick="closeUpgrade()">ZATVORI</button>
</div>

<div id="game-stats" style="display:none;">
    <div>💰 NOVAC: <span id="m-val" style="color: #00ff00;">$100</span></div>
    <div>❤️ HP BAZE: <span id="h-val" style="color: #ff0055;">100</span></div>
    <div>🌊 WAVE: <span id="w-val">1</span></div>
    <hr>
    <button class="btn" onclick="setTowerToPlace('basic')">KULA ($50)</button>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let peer, conn, myClass = 'eng';
let money = 150, hp = 100, wave = 1;
let enemies = [], towers = [], selectedTower = null;
let towerToPlace = null;

// PeerJS Setup
peer = new Peer();
peer.on('open', id => document.getElementById('my-id').innerText = id);
peer.on('connection', c => { conn = c; setupConn(); startGame(); });

function pickClass(c) { myClass = c; document.getElementById('char-select').style.display='none'; document.getElementById('online-setup').style.display='block'; }
function startHost() { startGame(); }
function joinGame() { 
    let id = document.getElementById('peer-input').value;
    conn = peer.connect(id);
    setupConn(); startGame();
}

function setupConn() {
    conn.on('data', data => {
        if(data.type === 'sync') { enemies = data.e; towers = data.t; money = data.m; hp = data.h; wave = data.w; updateUI(); }
    });
}

function startGame() {
    document.getElementById('menu').style.display = 'none';
    document.getElementById('game-stats').style.display = 'block';
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    updateUI();
    animate();
}

function setTowerToPlace(t) { towerToPlace = t; }

canvas.onclick = (e) => {
    let clickedT = towers.find(t => Math.hypot(t.x - e.clientX, t.y - e.clientY) < 30);
    if(clickedT) { openUpgrade(clickedT); return; }

    let cost = myClass === 'eng' ? 40 : 50;
    if(towerToPlace && money >= cost) {
        towers.push({
            x: e.clientX, y: e.clientY, lvlDmg: 1, lvlRng: 1, 
            dmg: myClass === 'sld' ? 25 : 15, range: 180, cd: 0
        });
        money -= cost;
        towerToPlace = null;
        updateUI();
    }
    closeUpgrade();
};

function openUpgrade(t) {
    selectedTower = t;
    document.getElementById('upgrade-ui').style.display = 'block';
    document.getElementById('up-title').innerText = `TOWER LVL ${t.lvlDmg + t.lvlRng}`;
    document.getElementById('cost-dmg').innerText = t.lvlDmg * 80;
    document.getElementById('cost-rng').innerText = t.lvlRng * 60;
    document.getElementById('up-stats').innerText = `Dmg: ${Math.floor(t.dmg)} | Range: ${t.range}`;
}

function doUpgrade(type) {
    if(!selectedTower) return;
    if(type === 'dmg') {
        let cost = selectedTower.lvlDmg * 80;
        if(money >= cost) { money -= cost; selectedTower.lvlDmg++; selectedTower.dmg *= 1.6; }
    } else {
        let cost = selectedTower.lvlRng * 60;
        if(money >= cost) { money -= cost; selectedTower.lvlRng++; selectedTower.range += 40; }
    }
    updateUI();
    openUpgrade(selectedTower);
}

function closeUpgrade() { document.getElementById('upgrade-ui').style.display = 'none'; selectedTower = null; }

function updateUI() {
    document.getElementById('m-val').innerText = "$" + Math.floor(money);
    document.getElementById('h-val').innerText = hp;
    document.getElementById('w-val').innerText = wave;
}

// Spawner
setInterval(() => {
    if(document.getElementById('menu').style.display === 'none') {
        let isBoss = wave % 5 === 0;
        for(let i=0; i<(isBoss?1:5+wave); i++) {
            setTimeout(() => {
                enemies.push({
                    x: 0, y: canvas.height/2, 
                    hp: isBoss ? 2000*wave : 40 + (wave*60), 
                    speed: isBoss ? 0.6 : 1.2 + (wave*0.1),
                    isBoss: isBoss
                });
            }, i*700);
        }
        wave++;
        updateUI();
    }
}, 15000);

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,canvas.width, canvas.height);
    
    // Putanja (Sredina ekrana)
    ctx.strokeStyle = "#111"; ctx.lineWidth = 60; ctx.beginPath();
    ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();

    enemies.forEach((en, i) => {
        en.x += en.speed;
        if(en.x > canvas.width) { hp -= en.isBoss ? 50 : 10; enemies.splice(i, 1); updateUI(); return; }
        
        ctx.fillStyle = en.isBoss ? "#ff00ff" : "#ff0055";
        ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
        ctx.fillRect(en.x-15, en.y-15, en.isBoss?50:25, en.isBoss?50:25);
    });

    towers.forEach(t => {
        ctx.strokeStyle = var(--neon); ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(t.x, t.y, 25, 0, Math.PI*2); ctx.stroke();
        
        // Prikaz dometa ako je selektovana
        if(selectedTower === t) {
            ctx.strokeStyle = "rgba(0, 242, 255, 0.2)";
            ctx.beginPath(); ctx.arc(t.x, t.y, t.range, 0, Math.PI*2); ctx.stroke();
        }

        let target = enemies.find(e => Math.hypot(e.x - t.x, e.y - t.y) < t.range);
        if(target && t.cd <= 0) {
            ctx.strokeStyle = "white"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(target.x, target.y); ctx.stroke();
            target.hp -= t.dmg;
            t.cd = 20;
            if(target.hp <= 0) { money += (target.isBoss?250:15); enemies = enemies.filter(e => e !== target); updateUI(); }
        }
        if(t.cd > 0) t.cd--;
    });

    if(conn && peer.id === myId) conn.send({type: 'sync', e: enemies, t: towers, m: money, h: hp, w: wave});
    
    if(hp > 0) requestAnimationFrame(animate);
    else { ctx.fillStyle="white"; ctx.font="50px Arial"; ctx.fillText("GAME OVER", canvas.width/2-150, canvas.height/2); }
}
</script>
</body>
</html>
