<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Neon Defender: Hardcore</title>
    <style>
        :root { --neon: #00f2ff; --red: #ff0055; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Glassmorphism Menu */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .panel { 
            pointer-events: auto; background: rgba(10, 10, 10, 0.8); 
            backdrop-filter: blur(15px); border: 1px solid var(--neon); 
            border-radius: 15px; padding: 20px; box-shadow: 0 0 20px rgba(0,242,255,0.2);
        }

        #start-menu { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 400px; text-align: center; z-index: 1000;
        }

        #game-stats { position: absolute; top: 20px; left: 20px; width: 200px; }
        #upgrade-panel { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; flex-direction: row; gap: 10px; }

        .btn {
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 10px 15px; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px;
        }
        .btn:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }
        .stat-line { margin-bottom: 5px; border-bottom: 1px solid rgba(0,242,255,0.1); padding-bottom: 2px; }
        
        canvas { display: block; }
    </style>
</head>
<body>

<div id="start-menu" class="panel">
    <h1 style="color: var(--neon); text-shadow: 0 0 10px var(--neon);">NEON DEFENDER</h1>
    <p>Izaberi Klasu:</p>
    <button class="btn" onclick="initGame('eng')">ENGINEER (Jeftine kule)</button>
    <button class="btn" onclick="initGame('sld')">SOLDIER (Više DMG)</button>
    <button class="btn" onclick="initGame('med')">MEDIC (Više HP)</button>
    <p style="font-size: 0.8em; color: #555;">v3.0 - STABLE RELEASE</p>
</div>

<div id="ui-layer">
    <div id="game-stats" class="panel" style="display:none;">
        <div class="stat-line">💰 NOVAC: <span id="m-val" style="color:#0f0">$200</span></div>
        <div class="stat-line">❤️ HP: <span id="h-val" style="color:var(--red)">100</span></div>
        <div class="stat-line">🌊 WAVE: <span id="w-val">1</span></div>
        <hr border="0">
        <button class="btn" style="width:100%" onclick="setPlacing('basic')">KUPI KULU ($50)</button>
    </div>

    <div id="upgrade-panel" class="panel">
        <div id="up-info" style="margin-right: 20px;">
            <b id="up-name">KULA</b><br><small id="up-desc">Lvl 1</small>
        </div>
        <button class="btn" onclick="upgrade('dmg')">DMG ($<span id="c-dmg"></span>)</button>
        <button class="btn" onclick="upgrade('rng')">RANGE ($<span id="c-rng"></span>)</button>
        <button class="btn" style="border-color: #fff; color: #fff;" onclick="closeUpgrade()">X</button>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let money = 200, hp = 100, wave = 1, charClass = '';
let towers = [], enemies = [], projectiles = [], selectedTower = null, placing = null;

function initGame(cl) {
    charClass = cl;
    if(cl === 'med') hp = 200;
    if(cl === 'eng') money = 250;
    document.getElementById('start-menu').style.display = 'none';
    document.getElementById('game-stats').style.display = 'block';
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    updateUI();
    gameLoop();
}

function setPlacing(type) { placing = type; }

canvas.onclick = (e) => {
    // Provera klika na kulu
    let found = towers.find(t => Math.hypot(t.x - e.clientX, t.y - e.clientY) < 30);
    if(found) { openUpgrade(found); return; }

    // Postavljanje kule
    let cost = (charClass === 'eng') ? 40 : 50;
    if(placing && money >= cost) {
        towers.push({
            x: e.clientX, y: e.clientY, dmg: (charClass === 'sld' ? 25 : 15),
            range: 150, lvlD: 1, lvlR: 1, cd: 0
        });
        money -= cost; placing = null; updateUI();
    } else { closeUpgrade(); }
};

function openUpgrade(t) {
    selectedTower = t;
    document.getElementById('upgrade-panel').style.display = 'flex';
    document.getElementById('up-name').innerText = `KULA LVL ${t.lvlD + t.lvlR}`;
    document.getElementById('up-desc').innerText = `DMG: ${Math.floor(t.dmg)} | RNG: ${t.range}`;
    document.getElementById('c-dmg').innerText = t.lvlD * 70;
    document.getElementById('c-rng').innerText = t.lvlR * 50;
}

function upgrade(type) {
    if(!selectedTower) return;
    if(type === 'dmg') {
        let cost = selectedTower.lvlD * 70;
        if(money >= cost) { money -= cost; selectedTower.lvlD++; selectedTower.dmg *= 1.5; }
    } else {
        let cost = selectedTower.lvlR * 50;
        if(money >= cost) { money -= cost; selectedTower.lvlR++; selectedTower.range += 30; }
    }
    updateUI(); openUpgrade(selectedTower);
}

function closeUpgrade() { document.getElementById('upgrade-panel').style.display = 'none'; selectedTower = null; }

function updateUI() {
    document.getElementById('m-val').innerText = "$" + Math.floor(money);
    document.getElementById('h-val').innerText = hp;
    document.getElementById('w-val').innerText = wave;
}

// Spawner
setInterval(() => {
    if(charClass === '') return;
    let isBoss = wave % 5 === 0;
    let count = isBoss ? 1 : 5 + wave;
    for(let i=0; i<count; i++) {
        setTimeout(() => {
            enemies.push({
                x: 0, y: canvas.height/2,
                hp: isBoss ? 1500 * wave : 30 + (wave * 50),
                maxHp: isBoss ? 1500 * wave : 30 + (wave * 50),
                speed: isBoss ? 0.7 : 1.2 + (wave * 0.1),
                isBoss: isBoss
            });
        }, i * 600);
    }
    wave++; updateUI();
}, 12000);

function gameLoop() {
    ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fillRect(0,0,canvas.width, canvas.height);
    
    // Putanja
    ctx.strokeStyle = "#111"; ctx.lineWidth = 60; ctx.beginPath();
    ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();

    // Enemies
    enemies.forEach((en, i) => {
        en.x += en.speed;
        if(en.x > canvas.width) { hp -= en.isBoss ? 50 : 10; enemies.splice(i, 1); updateUI(); return; }
        
        ctx.fillStyle = en.isBoss ? "#ff00ff" : "#ff0055";
        ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
        ctx.fillRect(en.x-15, en.y-15, en.isBoss?50:25, en.isBoss?50:25);
        
        // HP bar
        ctx.fillStyle = "#333"; ctx.fillRect(en.x-15, en.y-25, 30, 4);
        ctx.fillStyle = "#0f0"; ctx.fillRect(en.x-15, en.y-25, (en.hp/en.maxHp)*30, 4);
    });

    // Towers
    towers.forEach(t => {
        ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 3; ctx.shadowBlur = 10;
        ctx.beginPath(); ctx.arc(t.x, t.y, 25, 0, Math.PI*2); ctx.stroke();
        
        if(selectedTower === t) {
            ctx.strokeStyle = "rgba(0,242,255,0.2)"; ctx.beginPath();
            ctx.arc(t.x, t.y, t.range, 0, Math.PI*2); ctx.stroke();
        }

        let target = enemies.find(e => Math.hypot(e.x - t.x, e.y - t.y) < t.range);
        if(target && t.cd <= 0) {
            ctx.strokeStyle = "white"; ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(target.x, target.y); ctx.stroke();
            target.hp -= t.dmg; t.cd = 20;
            if(target.hp <= 0) { money += (target.isBoss?200:15); enemies = enemies.filter(e => e !== target); updateUI(); }
        }
        if(t.cd > 0) t.cd--;
    });

    if(hp > 0) requestAnimationFrame(gameLoop);
    else { ctx.fillStyle="white"; ctx.font="50px Arial"; ctx.fillText("GAME OVER", canvas.width/2-150, canvas.height/2); }
}
</script>
</body>
</html>
