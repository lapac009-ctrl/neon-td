<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Neon Survivors: Starter Hero Edition</title>
    <style>
        :root { --neon: #00f2ff; --red: #ff0055; --gold: #ffcc00; --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .panel { 
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); 
            border: 2px solid var(--neon); border-radius: 15px; padding: 25px;
            box-shadow: 0 0 30px rgba(0,242,255,0.2);
        }

        #main-menu { position: absolute; inset: 30px; z-index: 1000; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        
        .hero-section { display: flex; gap: 20px; margin: 20px 0; }
        .hero-card { 
            width: 150px; background: var(--glass); border: 2px solid #333; 
            padding: 15px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .hero-card.equipped { border-color: #0f0; box-shadow: 0 0 15px #0f0; transform: scale(1.05); }

        .shop-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 600px; }
        .shop-item { background: var(--glass); padding: 10px; border: 1px solid #444; border-radius: 8px; cursor: pointer; }
        .shop-item.owned { border-color: var(--gold); background: rgba(255,204,0,0.1); }

        #game-ui { position: absolute; top: 20px; left: 20px; width: 230px; display: none; }
        #inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; }
        .slot { width: 65px; height: 65px; border: 2px solid #444; border-radius: 10px; cursor: pointer; background: var(--glass); display: flex; align-items: center; justify-content: center; font-size: 0.7em; }
        .slot.active { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }

        .btn-start { background: var(--neon); color: black; border: none; padding: 15px 50px; font-size: 1.5em; font-weight: bold; cursor: pointer; margin-top: 20px; border-radius: 50px; }
        .btn-start:hover { box-shadow: 0 0 25px var(--neon); }

        canvas { display: block; }
    </style>
</head>
<body>

<div id="main-menu" class="panel">
    <h1 style="color: var(--neon); text-shadow: 0 0 15px var(--neon); margin: 0;">NEON SURVIVORS</h1>
    <h3 style="color: var(--gold); margin: 5px;">GLOBAL COINS: <span id="g-coins">0</span></h3>

    <div class="hero-section">
        <div class="hero-card equipped" id="hero-free" onclick="equipHero('free')">
            <b style="color: #0f0;">FREE RECRUIT</b><br>
            <small>DMG: +5<br>START: +$50</small>
            <div style="margin-top:10px; font-size: 0.8em;">EQUIPPED</div>
        </div>
        <div class="hero-card" id="hero-pro" onclick="buyHero('pro', 2000)">
            <b style="color: var(--gold);">ELITE SOLDIER</b><br>
            <small>DMG: +25<br>SPEED: +10%</small>
            <div id="pro-price" style="margin-top:10px; font-size: 0.8em;">$2000</div>
        </div>
    </div>

    <div class="shop-grid">
        <div class="shop-item" onclick="buyItem('cannon', 500)"><b>Heavy Cannon</b><br><span id="c-cannon">$500</span></div>
        <div class="shop-item" onclick="buyItem('wall', 300)"><b>Iron Wall</b><br><span id="c-wall">$300</span></div>
    </div>

    <button class="btn-start" onclick="startGame()">POKRENI MEČ</button>
    <p style="color: #666; font-size: 0.8em; margin-top: 15px;">WAVE 20 = +50 Coins | WAVE 50 = +150 Coins | WAVE 100 = +500 Coins</p>
</div>

<div id="game-ui" class="panel">
    <div>💰 MEČ PARE: <span id="m-money" style="color:#0f0">$200</span></div>
    <div>❤️ HP BAZE: <span id="b-hp" style="color:var(--red)">100</span></div>
    <div>🌊 WAVE: <span id="w-num">1</span></div>
</div>

<div id="inventory">
    <div class="slot active" id="s-tower" onclick="sel('tower')">KULA<br>$50</div>
    <div class="slot" id="s-wall" onclick="sel('wall')">ZID<br>$30</div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let save = JSON.parse(localStorage.getItem('neon_v4_save')) || { coins: 0, items: [], hero: 'free' };
let money = 200, hp = 100, wave = 1, placing = 'tower';
let towers = [], enemies = [], walls = [];

function sync() {
    localStorage.setItem('neon_v4_save', JSON.stringify(save));
    document.getElementById('g-coins').innerText = save.coins;
    save.items.forEach(id => {
        let el = document.getElementById('c-' + id);
        if(el) { el.innerText = "KUPLJENO"; el.parentElement.classList.add('owned'); }
        if(id === 'hero-pro') {
            document.getElementById('pro-price').innerText = "OWNED";
            document.getElementById('hero-pro').style.opacity = "1";
        }
    });
}

function equipHero(id) {
    if(id === 'pro' && !save.items.includes('hero-pro')) {
        alert("Moraš prvo kupiti ovog heroja!"); return;
    }
    save.hero = id;
    document.querySelectorAll('.hero-card').forEach(c => c.classList.remove('equipped'));
    document.getElementById('hero-' + id).classList.add('equipped');
    sync();
}

function buyHero(id, cost) {
    if(save.coins >= cost && !save.items.includes('hero-' + id)) {
        save.coins -= cost; save.items.push('hero-' + id); sync();
        alert("Heroj kupljen!");
    } else if(save.items.includes('hero-' + id)) { equipHero(id); }
    else { alert("Nedovoljno coinsa!"); }
}

function buyItem(id, cost) {
    if(save.coins >= cost && !save.items.includes(id)) {
        save.coins -= cost; save.items.push(id); sync();
    }
}

function startGame() {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    document.getElementById('inventory').style.display = 'flex';
    if(save.hero === 'free') money = 250; else money = 200;
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    loop();
}

function sel(t) {
    placing = t;
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
    document.getElementById('s-' + t).classList.add('active');
}

canvas.onclick = (e) => {
    if(placing === 'tower' && money >= 50) {
        let dmg = 15;
        if(save.hero === 'free') dmg += 5;
        if(save.hero === 'pro') dmg += 25;
        if(save.items.includes('cannon')) dmg += 20;
        towers.push({ x: e.clientX, y: e.clientY, dmg: dmg, r: 200, cd: 0 });
        money -= 50;
    } else if(placing === 'wall' && money >= 30) {
        walls.push({ x: e.clientX, y: e.clientY, hp: save.items.includes('wall')?800:300, max: 800 });
        money -= 30;
    }
    document.getElementById('m-money').innerText = "$" + money;
};

setInterval(() => {
    if(document.getElementById('main-menu').style.display !== 'none') return;
    for(let i=0; i<5+wave; i++) {
        setTimeout(() => enemies.push({ x: 0, y: canvas.height/2, hp: 40+(wave*60), s: 1.2+(wave*0.05) }), i*700);
    }
    wave++; document.getElementById('w-num').innerText = wave;
}, 10000);

function loop() {
    ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,canvas.width, canvas.height);
    ctx.strokeStyle = "#111"; ctx.lineWidth = 60; ctx.beginPath();
    ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();

    walls.forEach(w => {
        ctx.fillStyle = "#555"; ctx.fillRect(w.x-10, w.y-40, 20, 80);
    });

    enemies.forEach((en, i) => {
        let b = walls.find(w => Math.abs(w.x-en.x)<20);
        if(b) { b.hp--; if(b.hp<=0) walls.splice(walls.indexOf(b), 1); }
        else en.x += en.s;

        if(en.x > canvas.width) { hp -= 10; enemies.splice(i,1); document.getElementById('b-hp').innerText = hp; }
        ctx.fillStyle = "red"; ctx.fillRect(en.x-12, en.y-12, 24, 24);
    });

    towers.forEach(t => {
        ctx.strokeStyle = "#00f2ff"; ctx.beginPath(); ctx.arc(t.x, t.y, 25, 0, Math.PI*2); ctx.stroke();
        let target = enemies.find(e => Math.hypot(e.x-t.x, e.y-t.y) < t.r);
        if(target && t.cd <= 0) {
            ctx.strokeStyle = "white"; ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(target.x, target.y); ctx.stroke();
            target.hp -= t.dmg; t.cd = 20;
            if(target.hp <= 0) { enemies = enemies.filter(e => e !== target); money += 15; save.coins += 2; sync(); }
        }
        if(t.cd > 0) t.cd--;
    });

    if(hp > 0) requestAnimationFrame(loop);
    else {
        let b = 0;
        if(wave > 100) b = 500; else if(wave > 50) b = 150; else if(wave > 20) b = 50;
        save.coins += b; sync();
        alert("GAME OVER! Wave Bonus: +" + b);
        location.reload();
    }
}
sync();
</script>
</body>
</html>
