<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Brawler Siege: Ice & Fire Edition</title>
    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --ice: #a0f0ff; --red: #ff0055; --bg: #030303; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        .panel { background: rgba(15, 15, 15, 0.96); backdrop-filter: blur(20px); border: 2px solid var(--neon); border-radius: 15px; padding: 20px; box-shadow: 0 0 25px rgba(0,242,255,0.2); }
        
        #main-menu { position: absolute; inset: 20px; z-index: 1000; overflow-y: auto; text-align: center; }
        .brawler-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin: 20px 0; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .card.equipped { border-color: #0f0; box-shadow: 0 0 10px #0f0; }
        .locked { opacity: 0.4; filter: grayscale(1); }

        #game-stats { position: absolute; top: 15px; left: 15px; display: none; z-index: 50; }
        #hotbar { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: none; gap: 10px; z-index: 50; }
        .slot { width: 80px; height: 100px; border: 2px solid #444; border-radius: 10px; cursor: pointer; text-align: center; background: rgba(0,0,0,0.8); }
        .slot.active { border-color: var(--neon); transform: scale(1.1); box-shadow: 0 0 15px var(--neon); }

        #upgrade-menu { position: absolute; bottom: 130px; left: 50%; transform: translateX(-50%); display: none; gap: 15px; align-items: center; z-index: 60; }
        .btn { background: var(--neon); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        
        canvas { display: block; }
    </style>
</head>
<body>

<div id="main-menu" class="panel">
    <h1 style="color: var(--neon); font-size: 2.5em;">BRAWLER SIEGE: ICE UPDATE</h1>
    <h2 style="color: var(--gold);">GLOBAL COINS: <span id="g-coins">0</span></h2>
    <button class="btn" style="font-size: 1.2em; padding: 15px 40px;" onclick="startGame()">POKRENI ODBRANU</button>
    <div class="brawler-grid" id="grid"></div>
</div>

<div id="game-stats" class="panel">
    <div style="color: #0f0;">💵 $<span id="m-val">500</span></div>
    <div style="color: var(--red);">❤️ HP: <span id="h-val">100</span></div>
    <div style="color: white;">🌊 WAVE: <span id="w-val">1</span></div>
</div>

<div id="upgrade-menu" class="panel">
    <div id="up-title" style="color: var(--neon);">LEVEL 1</div>
    <button class="btn" onclick="inGameUpgrade()">UPGRADE ($<span id="up-cost">100</span>)</button>
    <button class="btn" style="background:#555; color:white;" onclick="closeUpgrade()">X</button>
</div>

<div id="hotbar"></div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// 50 BRAWLERA + SPECIJALNI ICE BRAWLER
let brawlersPool = [];
for(let i=1; i<=50; i++) {
    let isIce = (i % 5 === 0); // Svaki 5. brawler je ICE tip
    brawlersPool.push({
        id: i, 
        name: isIce ? "ICE MAGE" : (i==1 ? "RECRUIT" : "BRW #"+i),
        unlocked: i==1, cost: i*150,
        dmg: isIce ? 5+(i*2) : 12+(i*6), 
        r: 180+(i*2), 
        color: isIce ? "#a0f0ff" : `hsl(${i*40}, 100%, 60%)`,
        type: isIce ? 'ice' : 'normal',
        freezeTime: isIce ? 30 : 0 // Frameovi zaleđivanja
    });
}

let save = JSON.parse(localStorage.getItem('brawler_siege_v3')) || { coins: 200, brawlers: brawlersPool, equipped: [1] };
let money, hp, wave, selectedInGame = null, currentPlacing = null;
let towers = [], enemies = [];

function sync() {
    localStorage.setItem('brawler_siege_v3', JSON.stringify(save));
    document.getElementById('g-coins').innerText = Math.floor(save.coins);
    renderMenu();
}

function renderMenu() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    save.brawlers.forEach(b => {
        const c = document.createElement('div');
        c.className = `card ${!b.unlocked?'locked':''} ${save.equipped.includes(b.id)?'equipped':''}`;
        c.innerHTML = `<b style="color:${b.color}">${b.name}</b><br>${!b.unlocked?'$'+b.cost:'OTKLJUČAN'}<br><small>${b.type=='ice'?'FREEZE':'DMG'}</small>`;
        c.onclick = () => {
            if(!b.unlocked && save.coins >= b.cost) { save.coins -= b.cost; b.unlocked = true; sync(); }
            else if(b.unlocked) {
                if(!save.equipped.includes(b.id)) {
                    if(save.equipped.length >= 4) save.equipped.shift();
                    save.equipped.push(b.id); sync();
                }
            }
        };
        grid.appendChild(c);
    });
}

function startGame() {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('game-stats').style.display = 'block';
    const hb = document.getElementById('hotbar');
    hb.style.display = 'flex'; hb.innerHTML = '';
    save.equipped.forEach(id => {
        let b = save.brawlers.find(x => x.id === id);
        hb.innerHTML += `<div class="slot" id="slot-${id}" onclick="currentPlacing=${id}; selectSlot(${id})">
            <b style="color:${b.color}">${b.name}</b><br><span style="color:#0f0">$${b.id*80}</span></div>`;
    });
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    money = 400; hp = 100; wave = 1; towers = []; enemies = [];
    updateUI(); loop();
}

function selectSlot(id) {
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
    document.getElementById('slot-'+id).classList.add('active');
}

canvas.onclick = (e) => {
    let t = towers.find(t => Math.hypot(t.x-e.clientX, t.y-e.clientY) < 30);
    if(t) {
        selectedInGame = t;
        document.getElementById('upgrade-menu').style.display = 'flex';
        document.getElementById('up-title').innerText = `${selectedInGame.name} LVL ${selectedInGame.lvl}`;
        document.getElementById('up-cost').innerText = selectedInGame.lvl * 120;
        return;
    }
    if(currentPlacing) {
        let b = save.brawlers.find(x => x.id === currentPlacing);
        let cost = b.id * 80;
        if(money >= cost) {
            towers.push({ ...b, x: e.clientX, y: e.clientY, lvl: 1, cd: 0 });
            money -= cost; updateUI();
        }
    }
    closeUpgrade();
};

function inGameUpgrade() {
    if(!selectedInGame) return;
    let cost = selectedInGame.lvl * 120;
    if(money >= cost) {
        money -= cost;
        selectedInGame.lvl++;
        selectedInGame.dmg *= 1.4;
        selectedInGame.r += 20;
        if(selectedInGame.type === 'ice') selectedInGame.freezeTime += 15; // Duže ledi
        updateUI();
        document.getElementById('up-title').innerText = `${selectedInGame.name} LVL ${selectedInGame.lvl}`;
        document.getElementById('up-cost').innerText = selectedInGame.lvl * 120;
    }
}

function closeUpgrade() { document.getElementById('upgrade-menu').style.display = 'none'; selectedInGame = null; }
function updateUI() {
    document.getElementById('m-val').innerText = money;
    document.getElementById('h-val').innerText = hp;
    document.getElementById('w-val').innerText = wave;
}

setInterval(() => {
    if(document.getElementById('main-menu').style.display !== 'none') return;
    for(let i=0; i<4+wave; i++) {
        setTimeout(() => enemies.push({ 
            x: 0, y: canvas.height/2, 
            hp: 30+(wave*70), s: 1.3+(wave*0.08), 
            max: 30+(wave*70), frozen: 0 
        }), i*800);
    }
    wave++; updateUI();
}, 11000);

function loop() {
    ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,canvas.width, canvas.height);
    ctx.strokeStyle = "#111"; ctx.lineWidth = 80; ctx.beginPath();
    ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();

    enemies.forEach((en, i) => {
        if(en.frozen > 0) {
            en.frozen--;
            ctx.fillStyle = "#00f2ff"; // Boja leda
        } else {
            en.x += en.s;
            ctx.fillStyle = "#ff0055";
        }
        
        if(en.x > canvas.width) { hp -= 10; enemies.splice(i, 1); updateUI(); return; }
        
        ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
        ctx.fillRect(en.x-15, en.y-15, 30, 30);
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#333"; ctx.fillRect(en.x-15, en.y-25, 30, 5);
        ctx.fillStyle = "#0f0"; ctx.fillRect(en.x-15, en.y-25, (en.hp/en.max)*30, 5);
    });

    towers.forEach(t => {
        ctx.strokeStyle = t.color; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.arc(t.x, t.y, 25, 0, Math.PI*2); ctx.stroke();
        
        if(selectedInGame === t) {
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.beginPath();
            ctx.arc(t.x, t.y, t.r, 0, Math.PI*2); ctx.stroke();
        }

        let target = enemies.find(e => Math.hypot(e.x-t.x, e.y-t.y) < t.r && e.x > 0);
        if(target && t.cd <= 0) {
            ctx.strokeStyle = t.type === 'ice' ? "#a0f0ff" : "white";
            ctx.lineWidth = t.type === 'ice' ? 4 : 2;
            ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(target.x, target.y); ctx.stroke();
            
            target.hp -= t.dmg;
            if(t.type === 'ice') target.frozen = t.freezeTime; // ZALEDI GA
            
            t.cd = t.type === 'ice' ? 40 : 20; // Ice puca sporije ali ledi
            if(target.hp <= 0) { enemies = enemies.filter(e => e !== target); money += 20; save.coins += 3; sync(); }
        }
        if(t.cd > 0) t.cd--;
    });

    if(hp > 0) requestAnimationFrame(loop);
    else { 
        save.coins += wave * 50; sync(); 
        alert("GAME OVER! Wave Bonus: +" + (wave*50)); location.reload(); 
    }
}
sync();
</script>
</body>
</html>
