<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Neon Survivors: Hardcore Grind</title>
    <style>
        :root { --neon: #00f2ff; --red: #ff0055; --gold: #ffcc00; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: #000; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        .panel { 
            background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(20px); 
            border: 2px solid var(--neon); border-radius: 15px; padding: 25px;
            box-shadow: 0 0 30px rgba(0,242,255,0.2);
        }

        #main-menu { position: absolute; inset: 40px; z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .shop-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; margin: 20px 0; }
        .shop-item { background: var(--glass); padding: 15px; border: 1px solid #333; cursor: pointer; border-radius: 10px; transition: 0.3s; }
        .shop-item:hover { border-color: var(--neon); transform: translateY(-5px); }
        .owned { border-color: var(--gold) !important; background: rgba(255, 204, 0, 0.1); }

        #game-ui { position: absolute; top: 20px; left: 20px; width: 250px; display: none; }
        #inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: none; gap: 15px; }
        .slot { width: 70px; height: 70px; border: 2px solid #333; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.7em; text-align: center; background: var(--glass); }
        .slot.active { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }

        .btn { background: transparent; border: 2px solid var(--neon); color: var(--neon); padding: 12px 30px; cursor: pointer; font-weight: bold; letter-spacing: 2px; }
        .btn:hover { background: var(--neon); color: black; }

        canvas { display: block; cursor: crosshair; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="main-menu" class="panel">
    <h1 style="font-size: 3em; color: var(--neon); text-shadow: 0 0 20px var(--neon);">NEON SURVIVORS</h1>
    <h2 style="color: var(--gold);">GLOBAL COINS: <span id="g-coins">0</span></h2>
    
    <div class="shop-grid">
        <div class="shop-item" onclick="buy('heavy_cannon', 400)"><b>HEAVY CANNON</b><br>DMG: 80<br><span id="c-heavy_cannon">$400</span></div>
        <div class="shop-item" onclick="buy('laser_sight', 800)"><b>LASER SIGHT</b><br>Auto-Aim 10%<br><span id="c-laser_sight">$800</span></div>
        <div class="shop-item" onclick="buy('shield_wall', 300)"><b>SHIELD WALL</b><br>HP: 800<br><span id="c-shield_wall">$300</span></div>
    </div>

    <button class="btn" onclick="start()">POKRENI MEČ</button>
</div>

<div id="game-ui" class="panel">
    <div>💰 MEČ PARE: <span id="m-money" style="color: #0f0;">$200</span></div>
    <div>❤️ HP BAZE: <span id="b-hp" style="color: var(--red);">100</span></div>
    <div>🌊 WAVE: <span id="w-num">1</span></div>
</div>

<div id="inventory">
    <div class="slot active" id="s-tower" onclick="sel('tower')">KULA<br>$50</div>
    <div class="slot" id="s-wall" onclick="sel('wall')">ZID<br>$30</div>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let save = JSON.parse(localStorage.getItem('neon_pro_save')) || { coins: 0, items: [] };
let money = 200, hp = 100, wave = 1, placing = 'tower';
let towers = [], enemies = [], walls = [], projectiles = [];

function sync() {
    localStorage.setItem('neon_pro_save', JSON.stringify(save));
    document.getElementById('g-coins').innerText = save.coins;
    save.items.forEach(id => {
        let el = document.getElementById('c-' + id);
        if(el) { el.innerText = "KUPLJENO"; el.parentElement.classList.add('owned'); }
    });
}

function buy(id, cost) {
    if(save.coins >= cost && !save.items.includes(id)) {
        save.coins -= cost; save.items.push(id); sync();
    } else { alert("Nedovoljno coinsa!"); }
}

function start() {
    document.getElementById('main-menu').style.display = 'none';
    document.getElementById('game-ui').style.display = 'block';
    document.getElementById('inventory').style.display = 'flex';
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    loop();
}

function sel(t) {
    placing = t;
    document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
    document.getElementById('s-' + t).classList.add('active');
}

canvas.onclick = (e) => {
    if(placing === 'tower' && money >= 50) {
        towers.push({ x: e.clientX, y: e.clientY, dmg: save.items.includes('heavy_cannon') ? 60 : 20, r: 200, cd: 0 });
        money -= 50;
    } else if(placing === 'wall' && money >= 30) {
        walls.push({ x: e.clientX, y: e.clientY, hp: save.items.includes('shield_wall') ? 800 : 300, max: 800 });
        money -= 30;
    }
    document.getElementById('m-money').innerText = "$" + money;
};

setInterval(() => {
    if(document.getElementById('main-menu').style.display !== 'none') return;
    for(let i=0; i<5+wave; i++) {
        setTimeout(() => enemies.push({ x: 0, y: canvas.height/2, hp: 40+(wave*60), s: 1.2+(wave*0.05) }), i*700);
    }
    wave++;
    document.getElementById('w-num').innerText = wave;
}, 10000);

function loop() {
    ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.fillRect(0,0,canvas.width, canvas.height);
    
    // Path
    ctx.strokeStyle = "#111"; ctx.lineWidth = 60; ctx.beginPath();
    ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();

    walls.forEach((w, i) => {
        ctx.fillStyle = "#555"; ctx.fillRect(w.x-10, w.y-40, 20, 80);
        ctx.fillStyle = "lime"; ctx.fillRect(w.x-10, w.y-50, (w.hp/800)*20, 5);
    });

    enemies.forEach((en, i) => {
        let block = walls.find(w => Math.abs(w.x-en.x)<20);
        if(block) { block.hp -= 1; if(block.hp<=0) walls.splice(walls.indexOf(block), 1); }
        else { en.x += en.s; }

        if(en.x > canvas.width) { hp -= 10; enemies.splice(i,1); document.getElementById('b-hp').innerText = hp; }

        ctx.fillStyle = var(--red); ctx.shadowBlur = 10; ctx.shadowColor = "red";
        ctx.fillRect(en.x-12, en.y-12, 24, 24);
    });

    towers.forEach(t => {
        ctx.strokeStyle = var(--neon); ctx.lineWidth = 3;
        ctx.beginPath(); ctx.arc(t.x, t.y, 25, 0, Math.PI*2); ctx.stroke();
        
        let target = enemies.find(e => Math.hypot(e.x-t.x, e.y-t.y) < t.r);
        if(target && t.cd <= 0) {
            ctx.strokeStyle = "white"; ctx.beginPath(); ctx.moveTo(t.x, t.y); ctx.lineTo(target.x, target.y); ctx.stroke();
            target.hp -= t.dmg; t.cd = 25;
            if(target.hp <= 0) { enemies = enemies.filter(e => e !== target); money += 15; save.coins += 2; sync(); }
        }
        if(t.cd > 0) t.cd--;
    });

    if(hp > 0) requestAnimationFrame(loop);
    else {
        // KRAJ IGRE - PROGRESIVNE NAGRADE
        let bonus = 0;
        if(wave > 100) bonus = 500;
        else if(wave > 50) bonus = 150;
        else if(wave > 20) bonus = 50;
        
        save.coins += bonus;
        sync();
        alert(`KRAJ! Wave: ${wave}. Dobio si +${bonus} Global Coins Bonusa!`);
        location.reload();
    }
}
sync();
</script>
</body>
</html>
